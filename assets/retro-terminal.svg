<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%">
  <style>
    @keyframes l1 { 0%,9%   { opacity:0 } 10%,100% { opacity:1 } }
    @keyframes l2 { 0%,19%  { opacity:0 } 20%,100% { opacity:1 } }
    @keyframes l3 { 0%,29%  { opacity:0 } 30%,100% { opacity:1 } }
    @keyframes l4 { 0%,44%  { opacity:0 } 45%,100% { opacity:1 } }
    @keyframes l5 { 0%,54%  { opacity:0 } 55%,100% { opacity:1 } }
    @keyframes l6 { 0%,64%  { opacity:0 } 65%,100% { opacity:1 } }
    @keyframes l7 { 0%,74%  { opacity:0 } 75%,100% { opacity:1 } }
    @keyframes l8 { 0%,84%  { opacity:0 } 85%,100% { opacity:1 } }
    @keyframes l9 { 0%,92%  { opacity:0 } 93%,100% { opacity:1 } }
    @keyframes blink { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
    @keyframes scanmove { 0% { transform: translateY(0); } 100% { transform: translateY(320px); } }

    .t { font-family: 'Courier New', monospace; font-size: 13px; }
    .prompt { fill: #06B6D4; }
    .output { fill: #27c93f; }
    .comment { fill: #6B7280; }
    .accent { fill: #8B5CF6; }
    .line1 { animation: l1 12s steps(1) infinite; }
    .line2 { animation: l2 12s steps(1) infinite; }
    .line3 { animation: l3 12s steps(1) infinite; }
    .line4 { animation: l4 12s steps(1) infinite; }
    .line5 { animation: l5 12s steps(1) infinite; }
    .line6 { animation: l6 12s steps(1) infinite; }
    .line7 { animation: l7 12s steps(1) infinite; }
    .line8 { animation: l8 12s steps(1) infinite; }
    .line9 { animation: l9 12s steps(1) infinite; }
    .cursor { animation: blink 0.8s steps(1) infinite; }
    .scanline {
      animation: scanmove 4s linear infinite;
      opacity: 0.04;
    }
  </style>
  <defs>
    <pattern id="lines" width="600" height="4" patternUnits="userSpaceOnUse">
      <rect width="600" height="1" fill="#fff" opacity="0.03"/>
    </pattern>
    <linearGradient id="screen-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111822"/>
      <stop offset="100%" stop-color="#0a0f16"/>
    </linearGradient>
  </defs>

  <!-- Monitor outer frame -->
  <rect width="600" height="320" rx="12" fill="#1a1a2e" stroke="#2d2d44" stroke-width="2"/>
  <!-- Title bar -->
  <rect y="0" width="600" height="32" rx="12" fill="#16162a"/>
  <rect y="16" width="600" height="16" fill="#16162a"/>
  <!-- Window controls -->
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="6" fill="#27c93f"/>
  <!-- Title text -->
  <text x="300" y="20" text-anchor="middle" font-family="monospace" font-size="12" fill="#6B7280">hatyibei@github ~ </text>
  <!-- Screen area -->
  <rect x="8" y="36" width="584" height="276" rx="4" fill="url(#screen-grad)"/>
  <!-- CRT scan lines overlay -->
  <rect x="8" y="36" width="584" height="276" rx="4" fill="url(#lines)"/>
  <!-- Moving scan bar -->
  <clipPath id="screen-clip"><rect x="8" y="36" width="584" height="276" rx="4"/></clipPath>
  <g clip-path="url(#screen-clip)">
    <rect class="scanline" x="8" y="36" width="584" height="8" fill="#fff"/>
  </g>

  <!-- Terminal content -->
  <g clip-path="url(#screen-clip)">
    <!-- Line 1: whoami -->
    <text class="t prompt line1" x="24" y="64">$</text>
    <text class="t output line1" x="40" y="64">whoami</text>

    <!-- Line 2: output -->
    <text class="t accent line2" x="24" y="88">hatyibei</text>

    <!-- Line 3: cat -->
    <text class="t prompt line3" x="24" y="120">$</text>
    <text class="t output line3" x="40" y="120">cat skills.json | jq '.current'</text>

    <!-- Line 4-7: JSON output -->
    <text class="t comment line4" x="24" y="148">{</text>
    <text class="t output line5" x="40" y="168">"stack": ["Next.js", "TypeScript", "GCP", "Firebase"],</text>
    <text class="t output line6" x="40" y="188">"ai":    ["Vertex AI", "LLM Apps", "MCP Protocol"],</text>
    <text class="t output line7" x="40" y="208">"motto": "Ship fast, iterate faster"</text>
    <text class="t comment line7" x="24" y="228">}</text>

    <!-- Line 8: product -->
    <text class="t prompt line8" x="24" y="260">$</text>
    <text class="t output line8" x="40" y="260">curl -s gen-diag.com | head -1</text>

    <!-- Line 9: output -->
    <text class="t accent line9" x="24" y="284">200 OK - AI-Powered Buzz Diagnosis Platform</text>

    <!-- Blinking cursor -->
    <text class="t prompt line9" x="24" y="304">$</text>
    <text class="t output cursor line9" x="40" y="304">_</text>
  </g>
</svg>